name: Build and deploy emscripten-wasm32

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Debug

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 4.0.14

    - name: Export Emscripten toolchain path
      run: echo "EMSCRIPTEN_ROOT=${EMSDK}/upstream/emscripten" >> "$GITHUB_ENV"
          
    - name: Bootstrap vcpkg
      run: |
        ./extern/vcpkg/bootstrap-vcpkg.sh -disableMetrics

    - name: Configure CMake
      run: cmake --preset wasm32-emscripten

    - name: Build
      run: cmake --build --preset wasm32-emscripten -j$(nproc)

    - name: Setup Pages
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/configure-pages@v5

    - name: Upload Pages artifact
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-pages-artifact@v4
      with:
        path: out/build/wasm32-emscripten

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
